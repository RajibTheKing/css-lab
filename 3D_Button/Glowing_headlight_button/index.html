<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>3D Headlight Control</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main>
		<div class="col">
			<div class="light-control">
				<div class="light-label">Headlights</div>
				<div class="switch-wrapper">
					<label class="switch">
						<input class="switch__input" type="checkbox" role="switch" aria-label="Headlight control">
						<span class="switch__label">Headlight</span>
						<span class="switch__lever">
							<span class="switch__lever-half-top"></span>
							<span class="switch__lever-half-bottom"></span>
						</span>
						<span class="switch__lever-shadow"></span>
					</label>
				</div>
			</div>
		</div>
		<div class="col col--dark">
			<div class="light-control">
				<div class="light-label">Headlights</div>
				<div class="switch-wrapper">
					<label class="switch">
						<input class="switch__input" type="checkbox" role="switch" aria-label="Headlight control">
						<span class="switch__label">Headlight</span>
						<span class="switch__lever">
							<span class="switch__lever-half-top"></span>
							<span class="switch__lever-half-bottom"></span>
						</span>
						<span class="switch__lever-shadow"></span>
					</label>
				</div>
			</div>
		</div>
	</main>
	<script src="script.js"></script>
</body>
</html>
